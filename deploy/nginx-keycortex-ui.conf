# =============================================================================
# KeyCortex Wallet UIs — nginx HTTPS config (local deployment)
#
# Serves:
#   Port 3005 — JS baseline     (wallet-baseline/)
#   Port 3006 — WASM frontend   (wallet-wasm/dist/)
#
# TLS using certs from certs/keycortex/
# =============================================================================

# ── JS Baseline — port 3005 ──────────────────────────────────────────────────
server {
    listen 3005 ssl;
    listen [::]:3005 ssl;
    server_name _;

    ssl_certificate     /home/vijay/demo/workspaces/certs/keycortex/keycortex.crt;
    ssl_certificate_key /home/vijay/demo/workspaces/certs/keycortex/keycortex.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /home/vijay/demo/workspaces/KeyCortex/ui/wallet-baseline;
    index index.html;

    # Correct MIME types
    types {
        text/html                 html htm;
        text/css                  css;
        application/javascript    js mjs;
        application/json          json;
        image/png                 png;
        image/svg+xml             svg;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Shared config & assets (relative paths from HTML: ../config/, ../assets/)
    location /config/ {
        alias /home/vijay/demo/workspaces/KeyCortex/ui/config/;
    }
    location /assets/ {
        alias /home/vijay/demo/workspaces/KeyCortex/ui/assets/;
    }

    # Cache-busting via ?v= query params; keep short cache for dev
    add_header Cache-Control "no-cache, must-revalidate";

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    access_log /home/vijay/demo/workspaces/.logs/nginx-kc-js.access.log;
    error_log  /home/vijay/demo/workspaces/.logs/nginx-kc-js.error.log;
}

# ── WASM Frontend — port 3006 ────────────────────────────────────────────────
server {
    listen 3006 ssl;
    listen [::]:3006 ssl;
    server_name _;

    ssl_certificate     /home/vijay/demo/workspaces/certs/keycortex/keycortex.crt;
    ssl_certificate_key /home/vijay/demo/workspaces/certs/keycortex/keycortex.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /home/vijay/demo/workspaces/KeyCortex/ui/wallet-wasm/dist;
    index index.html;

    # Correct MIME types (including WASM)
    types {
        text/html                 html htm;
        text/css                  css;
        application/javascript    js mjs;
        application/wasm          wasm;
        application/json          json;
        image/png                 png;
        image/svg+xml             svg;
    }

    # Main WASM app — SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Shared wallet-baseline assets (CSS, themes, logo) — already in dist/wallet-baseline/
    # but also alias the source for Trunk dev builds that reference ../wallet-baseline/
    location /wallet-baseline/ {
        alias /home/vijay/demo/workspaces/KeyCortex/ui/wallet-baseline/;
    }

    # Shared config & assets
    location /config/ {
        alias /home/vijay/demo/workspaces/KeyCortex/ui/config/;
    }
    location /assets/ {
        alias /home/vijay/demo/workspaces/KeyCortex/ui/assets/;
    }

    # No cache for CSS/HTML/JS during development
    add_header Cache-Control "no-cache, must-revalidate";

    # Cache WASM artifacts aggressively (content-hashed filenames)
    location ~* \.(wasm)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    access_log /home/vijay/demo/workspaces/.logs/nginx-kc-wasm.access.log;
    error_log  /home/vijay/demo/workspaces/.logs/nginx-kc-wasm.error.log;
}
